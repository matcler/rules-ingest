name: Dataset Baseline Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "codex/**"

concurrency:
  group: dataset-baseline-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dataset-baseline-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator dependencies
        run: python -m pip install -r requirements.txt

      - name: Run canonical dataset baseline gate
        run: make gate-baseline-ci
